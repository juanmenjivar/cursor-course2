services:
  # Next.js Development Server
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: jomr-cursor-proj-dev-container
    # Port 8000 is the project default (change host side if this port is reserved on Windows).
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - dck-vol-jomr-dev:/app/node_modules
      - dck-vol-jomr-dev-next:/app/.next
    environment:
      # Do NOT set NEXT_PUBLIC_* here - they are loaded from env_file. Host interpolation would override env_file with empty values.
      # Dev-only: disable TLS verification for Node HTTPS (e.g. corporate SSL inspection / self-signed chain). INSECURE — never use in production.
      - NODE_TLS_REJECT_UNAUTHORIZED=0
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - PORT=8000
      - HOSTNAME=0.0.0.0
      # NextAuth: URL the browser uses to access the app (required for session fetch in Docker)
      - NEXTAUTH_URL=http://localhost:8000
      # NextAuth: Trust Host header (required for Docker/proxies; use env var since trustHost not in v4 types)
      - AUTH_TRUST_HOST=true
    # Env: .env.local in project root (Next.js loads from cwd; Docker injects via env_file)
    env_file:
      - .env.local
    command: sh -c "yarn install && yarn dev"
    restart: unless-stopped
    stdin_open: true
    tty: true

volumes:
  dck-vol-jomr-dev:
    name: dck-vol-jomr-dev
  dck-vol-jomr-dev-next:
    name: dck-vol-jomr-dev-next
